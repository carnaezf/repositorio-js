<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Registro Civil de Mascotas</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">

  <main class="container py-4">
    <h1 class="mb-3">Registro Civil de Mascotas</h1>

    <p class="text-muted">
      Sistema de registro de mascotas asociado al RUT de su dueño.
    </p>

    <section class="card mb-4">
      <div class="card-body">
        <h2 class="h5">Registrar mascota</h2>

        <form id="formMascota">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre mascota</label>
            <input type="text" id="nombre" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="rut" class="form-label">RUT dueño</label>
            <input type="text" id="rut" class="form-control" />
          </div>

          <button class="btn btn-primary" type="submit">
            Registrar
          </button>
        </form>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-body">
        <h2 class="h5">Buscar mascotas por RUT</h2>

        <div class="input-group">
          <input
            type="text"
            id="rutBusqueda"
            class="form-control"
            placeholder="Ej: 12345678-9"
          />
          <button id="btnBuscarRut" class="btn btn-secondary">
            Buscar
          </button>
        </div>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-body">
        <h2 class="h5">Listado de mascotas</h2>

        <button id="btnCargar" class="btn btn-success mb-3">
          Cargar mascotas
        </button>

        <div id="mensaje"></div>

        <ul id="listaMascotas" class="list-group"></ul>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
