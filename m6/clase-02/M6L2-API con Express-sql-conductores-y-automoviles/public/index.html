<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conductores y Automóviles</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <main class="container py-5">
        <section class="card p-4 shadow-sm">
            <h1 class="mb-3">Conductores y Automóviles</h1>

            <p>
                Cliente simple para consumir una API creada con Express y PostgreSQL.
            </p>

            <div class="d-flex flex-column flex-md-row flex-wrap gap-2 mb-4">
                <button id="btn-conductores" class="btn btn-primary">
                    Ver conductores
                </button>

                <button id="btn-automoviles" class="btn btn-success">
                    Ver automóviles
                </button>

                <button id="btn-conductores-sin-auto" class="btn btn-warning">
                    Conductores sin auto por edad
                </button>

                <button id="btn-solitos" class="btn btn-secondary">
                    Ver solitos
                </button>

                <button id="btn-auto-patente" class="btn btn-info">
                    Buscar auto por patente
                </button>

                <button id="btn-auto-inicio" class="btn btn-dark">
                    Buscar autos por inicio de patente
                </button>
            </div>

            <section>
                <h2 class="h4">Resultado</h2>

                <div id="resultado" class="border rounded p-3 bg-light">
                    Presione un botón para consultar la API.
                </div>
            </section>
        </section>
    </main>

    <script src="./app.js"></script>
</body>

</html>
