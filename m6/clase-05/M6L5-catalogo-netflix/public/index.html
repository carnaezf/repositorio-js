<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Netflix</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <main class="container py-5">
        <section class="card p-4 shadow-sm">
            <h1 class="mb-3">Catálogo Netflix</h1>

            <p>
                Cliente web simple para consumir una API REST creada con Express y File System.
            </p>

            <div class="alert alert-primary">
                Use los botones para listar películas o series. También puede ordenar los resultados.
            </div>

            <section class="mb-4">
                <h2 class="h4">Listados</h2>

                <div class="d-flex flex-column flex-md-row gap-2 mb-3">
                    <button id="btn-peliculas" class="btn btn-primary">
                        Lista de películas
                    </button>

                    <button id="btn-series" class="btn btn-success">
                        Lista de series
                    </button>
                </div>

                <div class="row g-2">
                    <div class="col-12 col-md-4">
                        <select id="orden" class="form-select">
                            <option value="">Ordenar por...</option>
                            <option value="nombre">Nombre</option>
                            <option value="anio">Año</option>
                            <option value="director">Director solo películas</option>
                            <option value="temporadas">Temporadas solo series</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="mb-4">
                <h2 class="h4">Agregar película</h2>

                <form id="form-pelicula" class="row g-2">
                    <div class="col-12 col-md-4">
                        <input type="text" id="pelicula-nombre" class="form-control" placeholder="Nombre" required>
                    </div>

                    <div class="col-12 col-md-4">
                        <input type="text" id="pelicula-director" class="form-control" placeholder="Director" required>
                    </div>

                    <div class="col-12 col-md-2">
                        <input type="number" id="pelicula-anio" class="form-control" placeholder="Año" required>
                    </div>

                    <div class="col-12 col-md-2">
                        <button class="btn btn-dark w-100" type="submit">
                            Agregar
                        </button>
                    </div>
                </form>
            </section>

            <section class="mb-4">
                <h2 class="h4">Agregar serie</h2>

                <form id="form-serie" class="row g-2">
                    <div class="col-12 col-md-4">
                        <input type="text" id="serie-nombre" class="form-control" placeholder="Nombre" required>
                    </div>

                    <div class="col-12 col-md-3">
                        <input type="number" id="serie-anio" class="form-control" placeholder="Año estreno" required>
                    </div>

                    <div class="col-12 col-md-3">
                        <input type="number" id="serie-temporadas" class="form-control" placeholder="Temporadas" required>
                    </div>

                    <div class="col-12 col-md-2">
                        <button class="btn btn-dark w-100" type="submit">
                            Agregar
                        </button>
                    </div>
                </form>
            </section>

            <section>
                <h2 class="h4">Resultado</h2>

                <div id="resultado" class="border rounded p-3 bg-light">
                    Presione un botón para comenzar.
                </div>
            </section>
        </section>
    </main>

    <script src="../js/main.js"></script>
</body>

</html>
