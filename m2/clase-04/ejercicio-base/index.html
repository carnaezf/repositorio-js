<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- 
    Meta viewport:
    Necesario para que el diseño responsive funcione correctamente
    en celulares y tablets.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tienda Responsive</title>

  <!-- 
    Bootstrap por CDN:
    Permite usar clases como navbar, container, row, col, card, etc.
  -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <!-- CSS propio del proyecto -->
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

  <!-- 
    NAVBAR:
    Bootstrap ya entrega una estructura responsive.
    En mobile se verá como botón hamburguesa.
    En pantallas grandes se expandirá horizontalmente.
  -->
  <nav class="navbar navbar-expand-lg bg-light border-bottom">
    <div class="container">

      <!-- Marca o nombre de la tienda -->
      <a class="navbar-brand fw-bold" href="#">Tienda</a>

      <!-- 
        Botón hamburguesa:
        Se muestra en pantallas pequeñas.
        El atributo data-bs-target debe coincidir con el id del menú.
      -->
      <button 
        class="navbar-toggler" 
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#menuPrincipal"
        aria-controls="menuPrincipal"
        aria-expanded="false"
        aria-label="Abrir menú"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menú colapsable -->
      <div class="collapse navbar-collapse" id="menuPrincipal">
        <ul class="navbar-nav ms-auto">

          <!-- TODO: Agregar enlaces reales o modificar textos -->
          <li class="nav-item">
            <a class="nav-link active" href="#">Inicio</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Productos</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Contacto</a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- 
    CONTENIDO PRINCIPAL:
    Aquí construiremos la grilla de productos.
  -->
  <main class="container my-4">

    <h1 class="mb-4">Productos destacados</h1>

    <!-- 
      Sistema de grillas Bootstrap:
      row crea una fila.
      Cada producto estará dentro de una columna.
    -->
    <section class="row g-3">

      <!-- Producto 1 -->
      <article class="col-12 col-lg-6">
        <div class="producto-card">

          <!-- Imagen simulada del producto -->
          <div class="producto-img"></div>

          <div>
            <h2>Producto 1</h2>
            <p>$ 12.990</p>
          </div>

        </div>
      </article>

      <!-- Producto 2 -->
      <article class="col-12 col-lg-6">
        <div class="producto-card">

          <div class="producto-img"></div>

          <div>
            <h2>Producto 2</h2>
            <p>$ 12.990</p>
          </div>

        </div>
      </article>

      <!-- Producto 3 -->
      <article class="col-12 col-lg-6">
        <div class="producto-card">

          <div class="producto-img"></div>

          <div>
            <h2>Producto 3</h2>
            <p>$ 12.990</p>
          </div>

        </div>
      </article>

      <!-- 
        TODO:
        Agrega un cuarto producto copiando la estructura anterior.
        Luego prueba cómo cambia la grilla en escritorio.
      -->

    </section>
  </main>

  <!-- 
    Script de Bootstrap:
    Necesario para que funcione el botón hamburguesa del navbar.
  -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

</body>
</html>
