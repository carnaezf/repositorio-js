<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <h2>Ejemplos de incorporación de JavaScript</h2>

    <!-- Ejemplo JS en LÍNEA -->
    <button onclick="alert('Hola! Soy JS en línea'); console.log('Mensaje desde JS en línea');"
        class="btn btn-primary my-2">
        JS en línea
    </button>

    <!--  Ejemplo JS INTERNO -->
    <button onclick="mensajeInterno()" class="btn btn-success my-2">
        JS interno
    </button>

    <script>
        function mensajeInterno() {
            alert("Hola! Soy JS interno");
            console.log("Mensaje desde JS interno");
        }
    </script>

    <!-- Ejemplo JS EXTERNO -->
    <button onclick="mensajeExterno()" class="btn btn-warning my-2">
        JS externo
    </button>

    <!-- Conectamos el archivo JS externo -->
    <script src="./assets/js/main.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
