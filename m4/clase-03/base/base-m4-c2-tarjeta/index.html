<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Tarjeta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <main class="container py-5">
        <section class="card shadow-sm p-4 mx-auto" style="max-width: 600px;">
            <h1 class="h3 text-center mb-4">Generador de Tarjeta</h1>

            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ej: Juan Pérez">
            </div>

            <div class="mb-3">
                <label for="profesion" class="form-label">Profesión</label>
                <input type="text" id="profesion" class="form-control" placeholder="Ej: Desarrollador Web">
            </div>

            <div class="mb-3">
                <label for="ciudad" class="form-label">Ciudad</label>
                <input type="text" id="ciudad" class="form-control" placeholder="Ej: Santiago">
            </div>

            <div class="d-grid">
                <button id="btnGenerar" class="btn btn-primary">
                    Generar Tarjeta
                </button>
            </div>

            <div id="resultado" class="mt-4"></div>
        </section>
    </main>

    <script src="./assets/js/script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
