<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio DOM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <main class="container py-5">
        <h1 class="text-center mb-5">Ejercicio DOM</h1>

        <section class="card p-4 shadow-sm mb-4">
            <h2 class="h5">1. Repetir palabra</h2>

            <input id="palabra" class="form-control mb-2" type="text" placeholder="Ingrese una palabra">
            <input id="cantidad" class="form-control mb-2" type="number" placeholder="¿Cuántas veces?">

            <button id="btnRepetir" class="btn btn-primary">REPETIR</button>

            <p id="resultadoRepetir" class="mt-3"></p>
        </section>

        <section class="card p-4 shadow-sm mb-4">
            <h2 class="h5">2. Aplicar color</h2>

            <input id="color" class="form-control form-control-color mb-2" type="color" value="#00ff00">

            <button id="btnAplicar" class="btn btn-success">APLICAR</button>

            <p id="parrafoColor" class="mt-3 p-3">
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Similique possimus incidunt ducimus officiis
                tempore blanditiis sapiente perferendis non.
            </p>
        </section>

        <section class="card p-4 shadow-sm mb-4">
            <h2 class="h5">3. Calculadora básica</h2>

            <input id="numeroUno" class="form-control mb-2" type="number" placeholder="Ingrese un número">
            <input id="numeroDos" class="form-control mb-2" type="number" placeholder="Ingrese otro número">

            <button id="btnCalcular" class="btn btn-warning">CALCULAR</button>

            <div id="resultadoCalcular" class="mt-3"></div>
        </section>

        <section class="card p-4 shadow-sm">
            <h2 class="h5">4. Invertir texto</h2>

            <input id="texto" class="form-control mb-2" type="text" placeholder="Ingrese algo">

            <button id="btnInvertir" class="btn btn-dark">INVERTIR</button>

            <p id="resultadoInvertir" class="mt-3"></p>
        </section>
    </main>

    <script src="./assets/js/script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
